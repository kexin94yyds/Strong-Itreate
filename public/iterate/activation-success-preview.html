<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iterate | Activation Success Preview</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.04), transparent 28%),
        rgba(8, 8, 8, 0.94);
      color: #fff;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .toolbar {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.18);
    }

    .toolbar p {
      margin: 0;
    }

    .toolbar-eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.58);
    }

    .toolbar-title {
      margin-top: 10px;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
    }

    .toolbar-copy {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.78);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: #fafafa;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
    }

    .chip.active {
      background: #fafafa;
      color: #171717;
      border-color: #fafafa;
    }

    .preview-shell {
      min-height: 760px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .card {
      width: min(92vw, 460px);
      max-height: min(620px, calc(100dvh - 32px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(14px, 2.2vh, 18px);
      padding: clamp(16px, 2.6vh, 22px);
      overflow-y: auto;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top center, rgba(255, 255, 255, 0.05), transparent 38%),
        linear-gradient(180deg, rgba(19, 19, 19, 0.98), rgba(10, 10, 10, 0.98));
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
    }

    .badge {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.62);
    }

    .badge-subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.42);
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 1.8vh, 14px);
    }

    .eyebrow {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.44);
    }

    .title {
      margin: 0;
      font-size: clamp(28px, 4.2vh, 32px);
      line-height: 1.15;
    }

    .subtitle {
      margin: 0;
      font-size: clamp(13px, 1.9vh, 14px);
      line-height: 1.75;
      color: rgba(255, 255, 255, 0.68);
    }

    .status-card {
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .status-label {
      margin: 0 0 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.46);
    }

    .status-value {
      margin: 0;
      font-size: clamp(16px, 2.4vh, 18px);
      line-height: 1.35;
      font-weight: 700;
    }

    .helper {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.56);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      position: sticky;
      bottom: 0;
      padding-top: 4px;
      background: linear-gradient(180deg, rgba(10, 10, 10, 0), rgba(10, 10, 10, 0.98) 24%);
    }

    .btn {
      width: 100%;
      min-height: 46px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
    }

    .btn.primary {
      border-color: #fff;
      background: #fff;
      color: #090909;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .preview-shell {
        min-height: auto;
      }
    }

    @media (max-width: 520px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <aside class="toolbar">
      <p class="toolbar-eyebrow">Success Preview</p>
      <p class="toolbar-title">图 3：激活成功后开始页</p>
      <p class="toolbar-copy">
        这页只预览激活成功后的第二步，不混输入框，不混激活前动作。
      </p>

      <div class="chips">
        <button class="chip" data-mode="day1">1 天版</button>
        <button class="chip active" data-mode="day7">7 天版</button>
        <button class="chip" data-mode="permanent">永久版</button>
      </div>
    </aside>

    <section class="preview-shell">
      <div class="card">
        <div class="topbar">
          <div class="brand">
            <img class="logo" src="/iterate/assets/favicon-CFdCgY3a.png" alt="iterate">
            <div>
              <p class="badge">Iterate Welcome</p>
              <p class="badge-subtitle">激活成功后的开始页</p>
            </div>
          </div>
        </div>

        <div class="content">
          <p class="eyebrow">Activation</p>
          <h1 class="title" id="title">7 天版已开启</h1>
          <p class="subtitle" id="subtitle">iterate 已准备好，你现在可以直接开始使用。</p>

          <div class="status-card">
            <p class="status-label">当前状态</p>
            <p class="status-value" id="status-value">7 天版已开启</p>
          </div>

          <p class="helper">
            如果你要把 iterate 接到当前 IDE 或 CLI，可以先复制安装提示词，再直接开始使用。
          </p>
        </div>

        <div class="actions">
          <button class="btn secondary">复制安装提示词</button>
          <button class="btn primary">直接开始使用</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const modes = {
      day1: '1 天版已开启',
      day7: '7 天版已开启',
      permanent: '永久版已开启',
    }

    const chips = Array.from(document.querySelectorAll('.chip'))
    const titleNode = document.getElementById('title')
    const statusNode = document.getElementById('status-value')

    function setMode(mode) {
      const text = modes[mode]
      titleNode.textContent = text
      statusNode.textContent = text

      chips.forEach(chip => {
        chip.classList.toggle('active', chip.dataset.mode === mode)
      })
    }

    chips.forEach(chip => {
      chip.addEventListener('click', () => setMode(chip.dataset.mode))
    })

    setMode('day7')
  </script>
</body>
</html>
