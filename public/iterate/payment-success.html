<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付成功 | iterate</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --card: #121212;
      --line: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.6);
      --accent: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1a1a1a, var(--bg) 55%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }
    .card {
      width: min(100%, 640px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0;
      line-height: 1.7;
      color: var(--muted);
    }
    .section {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }
    .code {
      margin-top: 14px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #0f0f0f;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      word-break: break-all;
      line-height: 1.6;
    }
    .row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    button, a.button {
      appearance: none;
      border: 1px solid var(--line);
      background: white;
      color: black;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    button.secondary, a.button.secondary {
      background: transparent;
      color: var(--text);
    }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .prompt-box {
      margin-top: 14px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #0f0f0f;
    }
    .step-label {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .prompt-box h2 {
      margin: 0 0 8px;
      font-size: 16px;
      letter-spacing: -0.02em;
    }
    .prompt-box p {
      font-size: 14px;
    }
    .status {
      margin-top: 12px;
      font-size: 14px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Payment Delivery</div>
    <h1>你的激活码已经准备好了</h1>
    <p>支付成功之后，真正需要交付的是激活码，不是订单号。把下面这串码复制到 iterate 桌面端里激活即可。</p>

    <div class="section">
      <div class="eyebrow">License Key</div>
      <div id="license-key" class="code">正在查询激活码...</div>
      <div class="row">
        <button id="copy-button">复制激活码</button>
        <a class="button secondary" href="https://iterate.xin" target="_blank" rel="noreferrer">打开官网</a>
      </div>
      <div id="status" class="status"></div>
      <div class="hint">如果这里迟迟没出码，不要重新支付。优先保留订单号，稍后继续打开本页恢复领取。</div>
    </div>

    <div class="section">
      <div class="eyebrow">Installation Guide</div>
      <div class="prompt-box">
        <div class="step-label">Step 2</div>
        <h2>安装引导</h2>
        <p>下载完成后，下一步就是按安装引导操作。先点下面这个按钮，你就会直接看到接下来该做什么。</p>
      </div>
      <div class="row">
        <a class="button" href="/iterate/INSTALLATION.md" target="_blank" rel="noreferrer">打开安装引导</a>
        <button id="copy-installation-button" class="secondary">复制安装提示词</button>
        <a class="button secondary" href="/iterate/INSTALLATION.md" target="_blank" rel="noreferrer">查看安装提示词</a>
      </div>
    </div>
  </div>

  <script>
    const codeNode = document.getElementById('license-key')
    const statusNode = document.getElementById('status')
    const copyButton = document.getElementById('copy-button')
    const copyInstallationButton = document.getElementById('copy-installation-button')
    const installationPrompt = `你是 Iterate 安装助手。用户已经下载好了 iterate，现在需要你继续完成：
1. 安装 iterate
2. 配置当前正在使用的 IDE 或 CLI 的 MCP
3. 刷新当前 IDE 或 CLI
4. 做一次最小验证，确认 iterate 已真正接入

## 你的工作原则
1. 先按标准安装路径走，只有真的卡住时才进入排障。
2. 对普通用户只使用这些产品语言：
   - 安装 iterate
   - 接入客户端
   - 配置 MCP
   - 刷新 IDE 或 CLI
3. 不要一上来就暴露 bundle 内部结构、历史命名或无关背景。
4. 只有在写 MCP 配置时，才使用内部路径。
5. 如果需要用户执行命令，每次只给一小步，并说明这一步在干什么。

## 你的执行顺序

### 第一步：确认环境
先确认两件事：
- 用户的操作系统：macOS / Windows / Linux
- 用户当前要接入的客户端：Windsurf / Cursor / Codex CLI / 其他支持 MCP 的 IDE 或 CLI

### 第二步：安装 iterate
如果是 macOS：
- 先确认 \`iterate.app\` 是否已经放进 \`Applications\`
- 如果没有，先让用户拖进去
- 然后让用户从 \`Applications\` 打开 iterate
- 如果首次打开被系统拦截，再指导用户右键选择“打开”

如果是 Windows 或 Linux：
- 优先按安装包自带的标准方式安装
- 不要默认让用户手工拼接路径和配置

### 第三步：配置 MCP
安装完成后，根据用户当前使用的客户端完成最小配置。

如果需要 MCP command，使用：

\`/Applications/iterate.app/Contents/MacOS/mcp-server\`

注意：
- 不要臆造配置路径
- Windsurf、Cursor、Codex CLI 的配置文件位置可能不同
- 改配置前先说明“准备修改哪个文件、加什么内容”

### 第四步：刷新当前 IDE 或 CLI
MCP 配置写完后，不要停在“理论上已经好了”。
必须继续指导用户：
- 如果是 IDE，就完全退出并重新打开当前 IDE
- 如果是 CLI，就结束当前会话并重新打开当前 CLI

### 第五步：最小验证
刷新后必须做一次最小验证：
1. iterate 能正常打开
2. 当前 IDE 或 CLI 已重新加载
3. MCP 已可见或已生效
4. 做一次最小调用测试，确认不是只写了配置但实际上没接上

## 你的输出格式
每次回复都按这个顺序输出：
1. 当前判断
2. 下一步动作
3. 如果需要用户操作，给出明确单步指令
4. 做完后如何验证

## 你的限制
- 不要默认让用户先跑危险或破坏性命令
- 不要把问题掩盖成“用户不会操作”
- 不要假设所有 IDE 或 CLI 的 MCP 配置格式一样
- 如果发现发布包缺文件、路径不一致、提示词与真实交付不一致，要明确指出这是产品问题

## 成功标准
成功不是“解释清楚了”，而是：
- iterate 已安装完成
- 当前 IDE 或 CLI 已完成 MCP 配置
- 当前 IDE 或 CLI 已刷新
- iterate 已真正可用`

    function formatLicenseType(type) {
      const value = String(type || '').trim().toLowerCase()
      if (value === 'day1')
        return '1 天版'
      if (value === 'day7')
        return '7 天版'
      if (value === 'permanent')
        return '永久版'
      return ''
    }

    function getOrderId() {
      const url = new URL(window.location.href)
      return url.searchParams.get('orderId')
        || url.searchParams.get('orderNo')
        || url.searchParams.get('externalOrderId')
        || ''
    }

    async function loadStatus() {
      const orderId = getOrderId()
      if (!orderId) {
        codeNode.textContent = '缺少订单号，无法查询激活码。'
        return
      }

      statusNode.textContent = `订单号：${orderId}`

      try {
        const response = await fetch(`/.netlify/functions/payment-status?orderId=${encodeURIComponent(orderId)}`)
        const result = await response.json()
        if (!response.ok || !result.ok) {
          throw new Error(result.error || '查询失败')
        }

        const licenseKey = result.data?.licenseKey
        const licenseTypeLabel = formatLicenseType(result.data?.licenseType)
        if (!licenseKey) {
          codeNode.textContent = '已支付，但激活码还未准备好。请稍后刷新本页恢复领取。'
          return
        }

        codeNode.textContent = licenseKey
        statusNode.textContent = licenseTypeLabel
          ? `订单号：${orderId} · 已购买：${licenseTypeLabel}`
          : `订单号：${orderId}`
      }
      catch (error) {
        codeNode.textContent = `查询失败：${error.message || error}`
      }
    }

    copyButton.addEventListener('click', async () => {
      const content = codeNode.textContent || ''
      if (!content || content.includes('查询')) {
        return
      }
      await navigator.clipboard.writeText(content)
      copyButton.textContent = '已复制'
      setTimeout(() => {
        copyButton.textContent = '复制激活码'
      }, 1200)
    })

    copyInstallationButton.addEventListener('click', async () => {
      await navigator.clipboard.writeText(installationPrompt)
      copyInstallationButton.textContent = '已复制'
      setTimeout(() => {
        copyInstallationButton.textContent = '复制安装提示词'
      }, 1200)
    })

    loadStatus()
  </script>
</body>
</html>
