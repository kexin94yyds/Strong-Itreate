<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iterate | 审核后台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --panel: #121217;
      --panel-soft: #17171d;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #f5f5f5;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(180deg, #0b0b0f 0%, #050507 100%);
      color: var(--text);
    }
    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    .topbar, .toolbar, .list, .summary {
      display: grid;
      gap: 16px;
    }
    .topbar {
      grid-template-columns: 1fr;
      margin-bottom: 24px;
    }
    .hero, .panel, .application {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
    }
    .hero {
      padding: 28px;
    }
    .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 0.92;
      letter-spacing: -0.05em;
    }
    .hero p {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.6;
    }
    .toolbar {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      align-items: end;
      margin-bottom: 24px;
    }
    .summary {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 24px;
    }
    .panel {
      padding: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
    }
    input, select, textarea, button {
      font: inherit;
    }
    input, select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      padding: 14px 16px;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .primary { background: var(--accent); color: #09090b; font-weight: 700; }
    .ghost { background: var(--panel-soft); color: var(--text); border: 1px solid var(--line); }
    .approve { background: rgba(34, 197, 94, 0.14); color: #86efac; }
    .reject { background: rgba(239, 68, 68, 0.14); color: #fca5a5; }
    .restore { background: rgba(245, 158, 11, 0.14); color: #fcd34d; }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      padding: 8px 12px;
    }
    .list {
      grid-template-columns: 1fr;
    }
    .application {
      padding: 20px;
    }
    .application-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    .application-title {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
    }
    .application-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      height: 38px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .status-submitted { background: rgba(245, 158, 11, 0.14); color: #fcd34d; }
    .status-approved { background: rgba(34, 197, 94, 0.14); color: #86efac; }
    .status-rejected { background: rgba(239, 68, 68, 0.14); color: #fca5a5; }
    .application-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 15px;
      line-height: 1.5;
      word-break: break-all;
    }
    .usage-note {
      margin: 0 0 16px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: #e4e4e7;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .empty {
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
      border-radius: 24px;
      border: 1px dashed var(--line);
    }
    .feedback {
      min-height: 22px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 960px) {
      .toolbar, .summary { grid-template-columns: 1fr 1fr; }
      .application-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .toolbar, .summary, .application-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="eyebrow">iterate admin</div>
      <h1>申请审核台</h1>
      <p>底层继续用 Supabase，但你以后看申请、筛选、复制联系方式和标记审核状态，都在这个页面里完成。</p>
    </section>

    <div class="toolbar">
      <div class="panel">
        <label for="admin-token">后台口令</label>
        <input id="admin-token" type="password" placeholder="输入后台访问口令">
      </div>
      <div class="panel">
        <label for="search">搜索</label>
        <input id="search" type="text" placeholder="邮箱 / 微信 / 邀请码 / 使用场景">
      </div>
      <div class="panel">
        <label for="status">审核状态</label>
        <select id="status">
          <option value="all">全部</option>
          <option value="submitted">待处理</option>
          <option value="approved">已通过</option>
          <option value="rejected">已拒绝</option>
        </select>
      </div>
      <div class="panel">
        <label for="sort">排序</label>
        <select id="sort">
          <option value="newest">最新提交</option>
          <option value="qualified">有效邀请最多</option>
          <option value="approved">已通过优先</option>
        </select>
      </div>
      <div class="panel">
        <label>&nbsp;</label>
        <button class="primary" id="load-applications">加载申请</button>
      </div>
    </div>

    <div class="summary" id="summary-cards">
      <div class="panel"><label>总申请</label><div id="summary-total">0</div></div>
      <div class="panel"><label>待处理</label><div id="summary-submitted">0</div></div>
      <div class="panel"><label>已通过</label><div id="summary-approved">0</div></div>
      <div class="panel"><label>有邀请进度</label><div id="summary-qualified">0</div></div>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="list" id="application-list"></div>
  </div>

  <script>
    const STORAGE_KEY = 'iterate_admin_token';
    const tokenInput = document.getElementById('admin-token');
    const searchInput = document.getElementById('search');
    const statusSelect = document.getElementById('status');
    const sortSelect = document.getElementById('sort');
    const loadButton = document.getElementById('load-applications');
    const feedback = document.getElementById('feedback');
    const listNode = document.getElementById('application-list');
    const summaryTotal = document.getElementById('summary-total');
    const summarySubmitted = document.getElementById('summary-submitted');
    const summaryApproved = document.getElementById('summary-approved');
    const summaryQualified = document.getElementById('summary-qualified');

    tokenInput.value = window.localStorage.getItem(STORAGE_KEY) || '';

    function setFeedback(message) {
      feedback.textContent = message;
    }

    function statusClass(status) {
      return `status status-${status || 'submitted'}`;
    }

    function statusLabel(status) {
      if (status === 'approved') return '已通过';
      if (status === 'rejected') return '已拒绝';
      return '待处理';
    }

    async function copyText(value) {
      await navigator.clipboard.writeText(value);
      setFeedback('已复制联系方式。');
    }

    function applicationCard(application) {
      const wrapper = document.createElement('section');
      wrapper.className = 'application';
      wrapper.innerHTML = `
        <div class="application-head">
          <div>
            <h2 class="application-title">${application.contactValue}</h2>
            <div class="application-sub">${application.contactType === 'email' ? '邮箱申请' : '微信申请'} · ${new Date(application.createdAt).toLocaleString('zh-CN')}</div>
          </div>
          <div class="${statusClass(application.applicationStatus)}">${statusLabel(application.applicationStatus)}</div>
        </div>
        <div class="application-grid">
          <div class="stat">
            <div class="stat-label">邀请码</div>
            <div class="stat-value">${application.inviteCode || '-'}</div>
          </div>
          <div class="stat">
            <div class="stat-label">来源邀请码</div>
            <div class="stat-value">${application.referralCode || '-'}</div>
          </div>
          <div class="stat">
            <div class="stat-label">邀请进度</div>
            <div class="stat-value">${application.qualifiedInviteCount} 位有效邀请</div>
          </div>
          <div class="stat">
            <div class="stat-label">邀请状态</div>
            <div class="stat-value">${application.referralStatus}</div>
          </div>
        </div>
        <p class="usage-note">${application.usageNote}</p>
        <div class="actions">
          <button class="ghost" data-copy-contact>复制联系方式</button>
          <button class="ghost" data-copy-link>复制邀请链接</button>
          <button class="approve" data-status="approved">标记通过</button>
          <button class="reject" data-status="rejected">标记拒绝</button>
          <button class="restore" data-status="submitted">恢复待处理</button>
        </div>
      `;

      wrapper.querySelector('[data-copy-contact]').addEventListener('click', async () => {
        await copyText(application.contactValue);
      });

      wrapper.querySelector('[data-copy-link]').addEventListener('click', async () => {
        await copyText(`${window.location.origin}/iterate/index.html?ref=${application.inviteCode}`);
      });

      wrapper.querySelectorAll('[data-status]').forEach((button) => {
        button.addEventListener('click', async () => {
          await updateStatus(application.id, button.dataset.status);
        });
      });

      return wrapper;
    }

    function renderSummary(applications) {
      summaryTotal.textContent = applications.length;
      summarySubmitted.textContent = applications.filter(item => item.applicationStatus === 'submitted').length;
      summaryApproved.textContent = applications.filter(item => item.applicationStatus === 'approved').length;
      summaryQualified.textContent = applications.filter(item => item.qualifiedInviteCount > 0).length;
    }

    function sortApplications(applications) {
      const rows = [...applications];
      if (sortSelect.value === 'qualified') {
        rows.sort((a, b) => b.qualifiedInviteCount - a.qualifiedInviteCount || new Date(b.createdAt) - new Date(a.createdAt));
        return rows;
      }
      if (sortSelect.value === 'approved') {
        const weight = { approved: 2, submitted: 1, rejected: 0 };
        rows.sort((a, b) => (weight[b.applicationStatus] - weight[a.applicationStatus]) || (new Date(b.createdAt) - new Date(a.createdAt)));
        return rows;
      }
      rows.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      return rows;
    }

    async function loadApplications() {
      const token = tokenInput.value.trim();
      if (!token) {
        setFeedback('先输入后台口令。');
        return;
      }

      window.localStorage.setItem(STORAGE_KEY, token);
      setFeedback('正在加载申请...');
      loadButton.disabled = true;

      try {
        const query = new URLSearchParams({
          search: searchInput.value.trim(),
          status: statusSelect.value,
        });
        const response = await fetch(`/.netlify/functions/admin-applications?${query.toString()}`, {
          headers: {
            'x-admin-token': token,
          },
        });
        const result = await response.json();
        if (!response.ok || !result?.ok) {
          throw new Error(result?.error || '加载失败');
        }

        const applications = sortApplications(result.data);
        renderSummary(applications);
        listNode.innerHTML = '';
        if (!applications.length) {
          listNode.innerHTML = '<div class="empty">当前没有符合筛选条件的申请。</div>';
        } else {
          applications.forEach((application) => {
            listNode.appendChild(applicationCard(application));
          });
        }
        setFeedback(`已加载 ${applications.length} 条申请。`);
      } catch (error) {
        setFeedback(error instanceof Error ? error.message : '加载失败');
      } finally {
        loadButton.disabled = false;
      }
    }

    async function updateStatus(id, status) {
      const token = tokenInput.value.trim();
      setFeedback('正在更新审核状态...');

      try {
        const response = await fetch('/.netlify/functions/admin-applications', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-token': token,
          },
          body: JSON.stringify({ id, status }),
        });
        const result = await response.json();
        if (!response.ok || !result?.ok) {
          throw new Error(result?.error || '更新失败');
        }

        setFeedback(`状态已更新为 ${statusLabel(status)}。`);
        await loadApplications();
      } catch (error) {
        setFeedback(error instanceof Error ? error.message : '更新失败');
      }
    }

    loadButton.addEventListener('click', loadApplications);
    searchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        loadApplications();
      }
    });
    sortSelect.addEventListener('change', loadApplications);
  </script>
</body>
</html>
